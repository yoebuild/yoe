# Make NetworkManager manage (and auto-DHCP) wired ethernet.
#
# Ubuntu's network-manager ships
# /usr/lib/NetworkManager/conf.d/10-globally-managed-devices.conf which
# restricts NM to wifi/cellular and leaves ethernet to netplan. yoe images
# have no netplan, so this drop-in (sorted after, and in /etc) re-includes
# ethernet so the wired NIC comes up with no connection profile.
[keyfile]
unmanaged-devices=*,except:type:ethernet,except:type:wifi,except:type:gsm,except:type:cdma
