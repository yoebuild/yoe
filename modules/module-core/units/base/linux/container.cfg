# Kernel CONFIG fragment for container runtimes (dockerd, containerd,
# podman). Merged into defconfig via scripts/kconfig/merge_config.sh
# during the linux unit's build.
#
# Sourced from Docker's recommendations + Alpine/Debian's container kernel
# configs. Most options are off in upstream defconfigs. `make olddefconfig`
# resolves any deps after merge.

# Filesystems — overlay for `docker run`'s default storage driver
CONFIG_OVERLAY_FS=y

# Network virtualization — bridge/veth for the default `bridge` network
CONFIG_BRIDGE=y
CONFIG_VETH=y
CONFIG_VLAN_8021Q=y
CONFIG_MACVLAN=m
CONFIG_IPVLAN=m
CONFIG_VXLAN=m

# Netfilter (iptables / nftables) — required for docker0 SNAT and the
# network controller. dockerd refuses to start without these.
CONFIG_NETFILTER=y
CONFIG_NETFILTER_ADVANCED=y
CONFIG_NETFILTER_NETLINK=y
CONFIG_NETFILTER_XTABLES=y
CONFIG_NF_CONNTRACK=y
CONFIG_NF_CONNTRACK_NETLINK=y
CONFIG_NF_NAT=y
CONFIG_IP_NF_IPTABLES=y
CONFIG_IP_NF_FILTER=y
CONFIG_IP_NF_NAT=y
CONFIG_IP_NF_TARGET_MASQUERADE=y
CONFIG_IP_NF_TARGET_REJECT=y
CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
CONFIG_NETFILTER_XT_MATCH_IPVS=y
CONFIG_NETFILTER_XT_TARGET_MASQUERADE=y
CONFIG_NETFILTER_XT_TARGET_REDIRECT=y
CONFIG_NF_TABLES=y
CONFIG_NF_TABLES_INET=y
CONFIG_NF_TABLES_IPV4=y
CONFIG_NF_TABLES_IPV6=y
CONFIG_NFT_NAT=y
CONFIG_NFT_MASQ=y
CONFIG_NFT_REDIR=y
CONFIG_NFT_CT=y
CONFIG_NFT_CHAIN_NAT=y

# Namespaces — pid/net/ipc/uts/user; user namespaces are needed for
# rootless containers and dockerd's default seccomp profile.
CONFIG_NAMESPACES=y
CONFIG_USER_NS=y
CONFIG_PID_NS=y
CONFIG_NET_NS=y
CONFIG_IPC_NS=y
CONFIG_UTS_NS=y

# Sandboxing
CONFIG_SECCOMP=y
CONFIG_SECCOMP_FILTER=y

# Cgroups (v2 unified) + per-controller flags Docker enumerates at start
CONFIG_CGROUPS=y
CONFIG_CGROUP_BPF=y
CONFIG_CGROUP_PIDS=y
CONFIG_CGROUP_DEVICE=y
CONFIG_CGROUP_FREEZER=y
CONFIG_CGROUP_NET_PRIO=y
CONFIG_CGROUP_NET_CLASSID=y
CONFIG_CGROUP_CPUACCT=y
CONFIG_CGROUP_HUGETLB=y
CONFIG_BLK_CGROUP=y
CONFIG_MEMCG=y
CONFIG_CPUSETS=y

# eBPF — required for cgroup v2 device control and many runc features
CONFIG_BPF=y
CONFIG_BPF_SYSCALL=y
CONFIG_BPF_JIT=y

# Misc but commonly required
CONFIG_KEYS=y
CONFIG_POSIX_MQUEUE=y
