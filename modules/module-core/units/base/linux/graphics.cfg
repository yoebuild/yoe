# Kernel CONFIG fragment for graphical / framebuffer support. Merged into
# defconfig alongside container.cfg during the linux unit's build.
#
# Goal: a freshly booted QEMU guest exposes /dev/fb0 (and /dev/dri/card0
# for DRM-aware apps), so Qt's linuxfb plugin and similar framebuffer
# UIs work without extra configuration. The same drivers cover physical
# boards that wire up Bochs / virtio-gpu — `yoe run --display` is the
# common test path, but the kernel is the same on real hardware.

# Direct rendering (DRM) — KMS framebuffer infrastructure
CONFIG_DRM=y
CONFIG_DRM_FBDEV_EMULATION=y
# /dev/fb0 from DRM via fbdev emulation
CONFIG_FB=y
CONFIG_FRAMEBUFFER_CONSOLE=y

# virtio-gpu — the GPU QEMU offers via `-device virtio-vga`. Built-in so
# the framebuffer is available before any userspace can modprobe.
CONFIG_DRM_VIRTIO_GPU=y

# Bochs — fallback for `-vga std` setups and some real boards.
CONFIG_DRM_BOCHS=y

# VGA / EFI framebuffer — covers BIOS boot (`-vga std` without virtio)
# and UEFI boot (efifb) when virtio-gpu and bochs are absent.
CONFIG_FB_VESA=y
CONFIG_FB_EFI=y
