DEFAULT yoe
LABEL yoe
    LINUX /boot/vmlinuz
    # video=1280x768 forces the DRM driver to set that mode on the
    # primary connector at boot. Without it, virtio-gpu's connector
    # auto-pick lands on 640x480 (the smallest of the EDID-advertised
    # modes), so the visible scanout is only the top-left 640x480 of
    # the 1280x800 framebuffer — any framebuffer UI that centres in
    # the buffer (e.g. qt-image) renders off-screen. The flag is a
    # no-op on connectors that don't exist (real hardware with HDMI-1
    # / DSI-1 / etc.), so leaving it in the default extlinux.conf is
    # harmless for non-QEMU images.
    APPEND console=ttyS0 root=/dev/vda1 rw devtmpfs.mount=1 video=1280x768
